name: iOS CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project GooglePhotoSync.xcodeproj -scheme GooglePhotoSync

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project GooglePhotoSync.xcodeproj \
            -scheme GooglePhotoSync \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build unsigned iPhoneOS app
        run: |
          rm -rf build-output
          xcodebuild \
            -project GooglePhotoSync.xcodeproj \
            -scheme GooglePhotoSync \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build-output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        run: |
          rm -rf ipa Payload
          mkdir -p Payload
          cp -R build-output/Build/Products/Release-iphoneos/GooglePhotoSync.app Payload/
          mkdir -p ipa
          zip -qry ipa/GooglePhotoSync-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GooglePhotoSync-unsigned-ipa
          path: ipa/GooglePhotoSync-unsigned.ipa
          if-no-files-found: error
