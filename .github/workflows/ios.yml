name: iOS CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project GooglePhotoSync.xcodeproj -scheme GooglePhotoSync

      - name: Create booted simulator
        run: |
          set -euo pipefail
          SIMULATOR_UDID="$(xcrun simctl list devices available -j | ruby -rjson -e "devices=JSON.parse(STDIN.read)['devices']; preferred=['iPhone 16 Pro','iPhone 16','iPhone 15 Pro','iPhone 15']; candidates=devices.values.flatten.select { |device| device['isAvailable'] && device['name'].start_with?('iPhone') }.map { |device| [device['name'], device['udid']] }; selected=preferred.lazy.filter_map { |name| candidates.find { |candidate| candidate[0] == name }&.last }.first || candidates.dig(0, 1); abort('No available iPhone simulator found') unless selected; puts selected")"
          xcrun simctl boot "$SIMULATOR_UDID" || true
          xcrun simctl bootstatus "$SIMULATOR_UDID" -b
          echo "SIMULATOR_UDID=$SIMULATOR_UDID" >> "$GITHUB_ENV"

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project GooglePhotoSync.xcodeproj \
            -scheme GooglePhotoSync \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath simulator-build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run simulator launch smoke test
        run: |
          set -euo pipefail
          APP_PATH="simulator-build/Build/Products/Debug-iphonesimulator/GooglePhotoSync.app"
          xcrun simctl uninstall "$SIMULATOR_UDID" com.example.GooglePhotoSync || true
          xcrun simctl install "$SIMULATOR_UDID" "$APP_PATH"
          sleep 5
          xcrun simctl spawn "$SIMULATOR_UDID" log stream --style compact --level debug --predicate 'process == "GooglePhotoSync" OR eventMessage CONTAINS[c] "GooglePhotoSync"' > simulator-log-stream.log 2>&1 &
          LOG_STREAM_PID=$!
          xcrun simctl launch --terminate-running-process "$SIMULATOR_UDID" com.example.GooglePhotoSync > launch-console.log 2>&1
          sleep 15
          if xcrun simctl terminate "$SIMULATOR_UDID" com.example.GooglePhotoSync; then
            echo "Launch smoke test passed."
          else
            echo "Launch smoke test failed."
            xcrun simctl spawn "$SIMULATOR_UDID" log show --style compact --last 5m --predicate 'process == "GooglePhotoSync" OR eventMessage CONTAINS[c] "GooglePhotoSync"' > simulator-log-show.log 2>&1 || true
            cat launch-console.log
            cat simulator-log-show.log
            kill "$LOG_STREAM_PID" || true
            wait "$LOG_STREAM_PID" || true
            exit 1
          fi
          kill "$LOG_STREAM_PID" || true
          wait "$LOG_STREAM_PID" || true

      - name: Upload simulator launch log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GooglePhotoSync-simulator-launch-log
          path: |
            launch-console.log
            simulator-log-stream.log
            simulator-log-show.log
          if-no-files-found: warn

      - name: Run UI smoke tests
        run: |
          set -euo pipefail
          rm -rf TestResults.xcresult
          xcodebuild \
            -project GooglePhotoSync.xcodeproj \
            -scheme GooglePhotoSync \
            -destination "id=$SIMULATOR_UDID" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GooglePhotoSync-test-results
          path: TestResults.xcresult
          if-no-files-found: warn

      - name: Build unsigned iPhoneOS app
        run: |
          rm -rf build-output
          xcodebuild \
            -project GooglePhotoSync.xcodeproj \
            -scheme GooglePhotoSync \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build-output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Stamp release app bundle metadata
        run: |
          set -euo pipefail
          APP_PATH="build-output/Build/Products/Release-iphoneos/GooglePhotoSync.app"
          INFO_PLIST="$APP_PATH/Info.plist"

          if /usr/libexec/PlistBuddy -c "Print :UILaunchStoryboardName" "$INFO_PLIST" >/dev/null 2>&1; then
            /usr/libexec/PlistBuddy -c "Set :UILaunchStoryboardName LaunchScreen" "$INFO_PLIST"
          else
            /usr/libexec/PlistBuddy -c "Add :UILaunchStoryboardName string LaunchScreen" "$INFO_PLIST"
          fi

      - name: Verify release app bundle contents
        run: |
          set -euo pipefail
          APP_PATH="build-output/Build/Products/Release-iphoneos/GooglePhotoSync.app"
          INFO_PLIST="$APP_PATH/Info.plist"

          test -d "$APP_PATH/LaunchScreen.storyboardc"

          LAUNCH_NAME="$(/usr/libexec/PlistBuddy -c 'Print :UILaunchStoryboardName' "$INFO_PLIST")"
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$INFO_PLIST")"
          BUILD="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$INFO_PLIST")"
          CLIENT_ID="$(/usr/libexec/PlistBuddy -c 'Print :GoogleOAuthClientID' "$INFO_PLIST")"

          echo "UILaunchStoryboardName=$LAUNCH_NAME"
          echo "CFBundleShortVersionString=$VERSION"
          echo "CFBundleVersion=$BUILD"

          [[ "$LAUNCH_NAME" == "LaunchScreen" ]]
          [[ -n "$VERSION" ]]
          [[ -n "$BUILD" ]]
          [[ -n "$CLIENT_ID" ]]

      - name: Package unsigned IPA
        run: |
          rm -rf ipa Payload
          mkdir -p Payload
          cp -R build-output/Build/Products/Release-iphoneos/GooglePhotoSync.app Payload/
          mkdir -p ipa
          zip -qry ipa/GooglePhotoSync-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GooglePhotoSync-unsigned-ipa
          path: ipa/GooglePhotoSync-unsigned.ipa
          if-no-files-found: error
