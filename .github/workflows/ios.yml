name: iOS CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project GooglePhotoSync.xcodeproj -scheme GooglePhotoSync

      - name: Create booted simulator
        run: |
          set -euo pipefail
          SIMULATOR_UDID="$(xcrun simctl list devices available -j | ruby -rjson -e "devices=JSON.parse(STDIN.read)['devices']; preferred=['iPhone 16 Pro','iPhone 16','iPhone 15 Pro','iPhone 15']; candidates=devices.values.flatten.select { |device| device['isAvailable'] && device['name'].start_with?('iPhone') }.map { |device| [device['name'], device['udid']] }; selected=preferred.lazy.filter_map { |name| candidates.find { |candidate| candidate[0] == name }&.last }.first || candidates.dig(0, 1); abort('No available iPhone simulator found') unless selected; puts selected")"
          xcrun simctl boot "$SIMULATOR_UDID" || true
          xcrun simctl bootstatus "$SIMULATOR_UDID" -b
          echo "SIMULATOR_UDID=$SIMULATOR_UDID" >> "$GITHUB_ENV"

      - name: Run UI smoke tests
        run: |
          set -euo pipefail
          rm -rf TestResults.xcresult
          xcodebuild \
            -project GooglePhotoSync.xcodeproj \
            -scheme GooglePhotoSync \
            -destination "id=$SIMULATOR_UDID" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GooglePhotoSync-test-results
          path: TestResults.xcresult
          if-no-files-found: warn

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project GooglePhotoSync.xcodeproj \
            -scheme GooglePhotoSync \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build unsigned iPhoneOS app
        run: |
          rm -rf build-output
          xcodebuild \
            -project GooglePhotoSync.xcodeproj \
            -scheme GooglePhotoSync \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build-output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        run: |
          rm -rf ipa Payload
          mkdir -p Payload
          cp -R build-output/Build/Products/Release-iphoneos/GooglePhotoSync.app Payload/
          mkdir -p ipa
          zip -qry ipa/GooglePhotoSync-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GooglePhotoSync-unsigned-ipa
          path: ipa/GooglePhotoSync-unsigned.ipa
          if-no-files-found: error
