name: GooglePhotoSync
options:
  minimumXcodeGenVersion: 2.39.0
  deploymentTarget:
    iOS: 17.0
  createIntermediateGroups: true

packages:
  AppAuth:
    url: https://github.com/openid/AppAuth-iOS.git
    from: 1.7.6

targets:
  GooglePhotoSync:
    type: application
    platform: iOS
    deploymentTarget: 17.0
    sources:
      - path: GooglePhotoSync
    info:
      path: GooglePhotoSync/Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.GooglePhotoSync
        PRODUCT_NAME: GooglePhotoSync
        INFOPLIST_FILE: GooglePhotoSync/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: 5.10
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        TARGETED_DEVICE_FAMILY: 1
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_ASSET_PATHS: "\"GooglePhotoSync/Resources\""
        ENABLE_PREVIEWS: YES
      configs:
        Debug:
          base:
            SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    dependencies:
      - package: AppAuth
    scheme:
      gatherCoverageData: false
      testTargets: []

