name: GooglePhotoSync
options:
  minimumXcodeGenVersion: 2.39.0
  deploymentTarget:
    iOS: 17.0
  createIntermediateGroups: true

packages:
  AppAuth:
    url: https://github.com/openid/AppAuth-iOS.git
    from: 1.7.6

targets:
  GooglePhotoSync:
    type: application
    platform: iOS
    deploymentTarget: 17.0
    sources:
      - path: GooglePhotoSync
        excludes:
          - Resources/Info.plist
          - Resources/GoogleOAuthClient.plist
    resources:
      - path: GooglePhotoSync/Resources/GoogleOAuthClient.plist
      - path: GooglePhotoSync/Resources/LaunchScreen.storyboard
    info:
      path: GooglePhotoSync/Resources/Info.plist
      properties:
        CFBundleDisplayName: Google Photo Sync
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        GoogleOAuthClientID: $(GOOGLE_CLIENT_ID)
        GoogleOAuthRedirectURI: $(GOOGLE_REDIRECT_URI)
        GoogleOAuthRedirectScheme: $(GOOGLE_REDIRECT_SCHEME)
        GooglePhotosAlbumTitle: $(GOOGLE_PHOTOS_ALBUM_TITLE)
        LSRequiresIPhoneOS: true
        NSPhotoLibraryUsageDescription: Google Photo Sync needs access to your library to upload and sync your photos to Google Photos.
        NSPhotoLibraryAddUsageDescription: Google Photo Sync needs access to your library to upload and sync your photos to Google Photos.
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchStoryboardName: LaunchScreen
        UIBackgroundModes:
          - fetch
          - processing
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLName: GoogleOAuth
            CFBundleURLSchemes:
              - $(GOOGLE_REDIRECT_SCHEME)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.GooglePhotoSync
        PRODUCT_NAME: GooglePhotoSync
        SWIFT_VERSION: 5.10
        CURRENT_PROJECT_VERSION: 6
        MARKETING_VERSION: 1.0.5
        TARGETED_DEVICE_FAMILY: 1
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_ASSET_PATHS: "\"GooglePhotoSync/Resources\""
        ENABLE_PREVIEWS: YES
      configs:
        Debug:
          base:
            SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    dependencies:
      - package: AppAuth
    scheme:
      gatherCoverageData: false
      testTargets:
        - GooglePhotoSyncUITests

  GooglePhotoSyncUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: 17.0
    sources:
      - path: GooglePhotoSyncUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.GooglePhotoSyncUITests
        PRODUCT_NAME: GooglePhotoSyncUITests
        SWIFT_VERSION: 5.10
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: GooglePhotoSync
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: GooglePhotoSync
